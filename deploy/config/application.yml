# ============================================================
# Video Manager 生产环境配置文件
# 部署到飞牛NAS时使用
# ============================================================

# ------------------------------------------------------------
# 服务器配置
# ------------------------------------------------------------
server:
  port: 8080                          # 后端服务端口
  servlet:
    context-path: /                   # 应用上下文路径

# ------------------------------------------------------------
# Spring 应用配置
# ------------------------------------------------------------
spring:
  application:
    name: video-manager               # 应用名称
  
  # ------------------------------------------------------------
  # 数据库配置 (MySQL)
  # ------------------------------------------------------------
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    
    # MySQL连接URL
    # 说明: 请根据实际环境修改以下参数
    # - localhost: MySQL服务器地址 (飞牛NAS上通常使用localhost)
    # - 3306: MySQL端口
    # - video_manager: 数据库名称
    url: jdbc:mysql://localhost:3306/video_manager?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    
    # 数据库用户名 (请修改为实际用户名)
    username: root
    
    # 数据库密码 (请修改为实际密码)
    password: your_mysql_password
    
    # ========================
    # HikariCP 连接池配置
    # ========================
    # HikariCP是Spring Boot默认的高性能连接池
    # 硬件环境: 飞牛NAS N305+ 48G内存 空余30G
    # 配置策略: 充足内存，可适当增大连接池
    
    hikari:
      # 连接池名称 (便于监控和日志识别)
      pool-name: VideoManagerHikariPool
      
      # 最小空闲连接数
      # 说明: 连接池中保持的最小空闲连接数量
      # 配置: 48G内存充足，设置为10，保证快速响应
      minimum-idle: 10
      
      # 最大连接数
      # 说明: 连接池允许的最大连接数量
      # 配置: 48G内存可支持更多连接，设置为50
      # 公式参考: (CPU核心数 * 2) + 磁盘数 = 约20-30
      # 实际设置50，支持较高并发
      maximum-pool-size: 50
      
      # 连接超时时间 (毫秒)
      # 说明: 等待获取连接的最大时间，超时将抛出异常
      # 配置: 30秒，足够应对突发流量
      connection-timeout: 30000
      
      # 空闲连接超时时间 (毫秒)
      # 说明: 空闲连接在被释放前保持的最长时间
      # 配置: 10分钟，定期清理不活跃连接
      idle-timeout: 600000
      
      # 连接最大存活时间 (毫秒)
      # 说明: 连接在池中的最大存活时间，防止长时间使用同一连接
      # 配置: 30分钟，定期刷新连接，配合MySQL wait_timeout
      max-lifetime: 1800000
      
      # 连接测试查询
      # 说明: 用于验证连接是否有效的SQL语句
      # MySQL推荐使用 SELECT 1
      connection-test-query: SELECT 1
      
      # 连接验证超时时间 (毫秒)
      # 说明: 验证连接有效性的超时时间
      validation-timeout: 5000
      
      # 泄漏检测阈值 (毫秒)
      # 说明: 连接被借出超过此时间未归还，将记录泄漏警告
      # 配置: 2分钟，生产环境监控连接泄漏
      leak-detection-threshold: 120000
      
      # 是否只读
      # 说明: 如果应用只读，设置为true可获得性能提升
      # 本应用需要写入，保持false
      read-only: false
      
      # 是否自动提交
      # 说明: 连接的自动提交模式
      auto-commit: true
      
      # 初始化失败超时 (毫秒)
      # 说明: 初始化连接池时等待连接成功的超时时间
      # 1表示等待1秒，-1表示无限等待
      initialization-fail-timeout: 1
      
      # 允许连接池暂停
      # 说明: 当数据库不可用时，是否允许连接池暂停
      allow-pool-suspension: false
      
      # 注册JMX MBean
      # 说明: 是否注册JMX用于监控
      register-mbeans: false
  
  # ------------------------------------------------------------
  # 文件上传配置
  # ------------------------------------------------------------
  servlet:
    multipart:
      enabled: true                   # 启用文件上传
      max-file-size: 100MB            # 单个文件最大大小
      max-request-size: 100MB         # 请求最大大小

  # ------------------------------------------------------------
  # JSON序列化配置
  # ------------------------------------------------------------
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss  # 日期格式
    time-zone: Asia/Shanghai          # 时区

# ------------------------------------------------------------
# MyBatis Plus 配置
# ------------------------------------------------------------
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml    # Mapper XML文件位置
  type-aliases-package: com.videomanager.entity    # 实体类包路径
  configuration:
    map-underscore-to-camel-case: true             # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # SQL日志输出
  global-config:
    db-config:
      id-type: auto                    # 主键自增
      logic-delete-field: deleted      # 逻辑删除字段
      logic-delete-value: 1            # 已删除值
      logic-not-delete-value: 0        # 未删除值

# ------------------------------------------------------------
# JWT 认证配置
# ------------------------------------------------------------
jwt:
  # JWT密钥
  # 【重要】生产环境必须修改为64位以上的随机字符串！
  # 生成方式: openssl rand -base64 64
  secret: your-secure-jwt-secret-key-change-this-in-production-at-least-64-chars
  
  # Token过期时间 (毫秒)
  # 86400000 = 24小时
  expiration: 86400000

# ------------------------------------------------------------
# 文件扫描配置
# ------------------------------------------------------------
scan:
  # 扫描路径
  # 说明: 通过Web界面(Settings页面)管理，无需在此配置
  # 如需初始化默认路径，可设置: /mnt/media1,/mnt/media2
  paths: ""
  
  # 支持的视频格式
  video-extensions: .mp4,.avi,.mkv,.mov,.wmv,.flv,.webm,.m4v
  
  # 支持的图片格式
  image-extensions: .jpg,.jpeg,.png,.gif,.bmp,.webp,.svg,.heic
  
  # 缩略图尺寸
  thumbnail-width: 320
  thumbnail-height: 320
  
  # 缩略图存储路径
  # 【重要】请修改为NAS上的实际路径，确保有写入权限
  # 示例: /vol2/1000/my_project/video-manager/data/thumbnails
  thumbnail-dir: ./data/thumbnails

# ------------------------------------------------------------
# 异步任务配置
# ------------------------------------------------------------
# 硬件环境: 飞牛NAS N305+ 48G内存
# 配置策略: 增加线程数，加快媒体文件扫描和缩略图生成
async:
  core-pool-size: 8                   # 核心线程数 (用于文件扫描、缩略图生成)
  max-pool-size: 16                   # 最大线程数 (应对突发任务)
  queue-capacity: 200                 # 队列容量 (缓存待处理任务)

# ------------------------------------------------------------
# 日志配置
# ------------------------------------------------------------
logging:
  level:
    root: INFO                        # 全局日志级别
    com.videomanager: DEBUG           # 项目日志级别
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ./logs/video-manager.log    # 日志文件路径
    max-size: 10MB                    # 单个日志文件最大大小
    max-history: 30                   # 保留最近30天的日志
